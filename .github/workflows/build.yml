name: Build & Package Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------
  # 普通构建：每次 push / PR 均运行测试并打包
  # ----------------------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          DISPLAY: ':0'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: idea-method-ref-finder-${{ steps.version.outputs.version }}
          path: build/distributions/*.zip
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Release：推送 v* tag 时触发，自动发布并更新 updatePlugins.xml
  # ----------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write   # 创建 Release、更新文件均需要此权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # v1.0.1 → 1.0.1
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Override version in build.gradle.kts
        # 确保 ZIP 文件名与 tag 版本一致，例如 idea-method-ref-finder-1.0.1.zip
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' build.gradle.kts
          grep '^version' build.gradle.kts   # 打印确认

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true

      # ----------------------------------------------------------------
      # 通过 GitHub Contents API 更新 updatePlugins.xml 并提交到 main，
      # 无需 git push，避免分支保护规则冲突。
      # ----------------------------------------------------------------
      - name: Update updatePlugins.xml in main branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          ZIP_URL="https://github.com/${REPO}/releases/download/${TAG}/idea-method-ref-finder-${VERSION}.zip"

          # 生成新的 XML 内容
          XML=$(cat <<XMLEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!--
            IntelliJ IDEA 自定义插件仓库描述文件。
            此文件由 GitHub Actions 在每次发布 Release 时自动更新。

            在 IDEA 中添加仓库：
            Settings → Plugins → ⚙️ → Manage Plugin Repositories
            → 填入以下 URL：
            https://raw.githubusercontent.com/${REPO}/main/updatePlugins.xml
          -->
          <plugins>
            <plugin
              id="com.example.method-ref-finder"
              url="${ZIP_URL}"
              version="${VERSION}"/>
          </plugins>
          XMLEOF
          )

          # Base64 编码（GitHub API 要求）
          ENCODED=$(echo "$XML" | base64 -w 0)

          # 获取当前文件的 SHA（更新现有文件时必须提供）
          FILE_SHA=$(gh api "repos/${REPO}/contents/updatePlugins.xml" \
            --jq '.sha' 2>/dev/null || echo "")

          # 调用 Contents API 写入文件
          if [ -n "$FILE_SHA" ]; then
            gh api "repos/${REPO}/contents/updatePlugins.xml" \
              --method PUT \
              --field message="chore: update updatePlugins.xml → ${TAG}" \
              --field content="$ENCODED" \
              --field sha="$FILE_SHA" \
              --field branch="main"
          else
            gh api "repos/${REPO}/contents/updatePlugins.xml" \
              --method PUT \
              --field message="chore: update updatePlugins.xml → ${TAG}" \
              --field content="$ENCODED" \
              --field branch="main"
          fi

          echo "updatePlugins.xml 已更新，指向 ${ZIP_URL}"
