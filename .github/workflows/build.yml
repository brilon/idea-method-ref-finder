name: Build & Package Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 支持手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ----------------------------------------------------------------
      # 运行单元测试（LightJavaCodeInsightFixtureTestCase5 使用内置 IDE 沙箱）
      # ----------------------------------------------------------------
      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          # 无头环境下运行 Swing 测试所需
          DISPLAY: ':0'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      # ----------------------------------------------------------------
      # 构建并打包插件 ZIP（位于 build/distributions/）
      # ----------------------------------------------------------------
      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      # 从 build.gradle.kts 中读取版本号，用于命名产物
      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: idea-method-ref-finder-${{ steps.version.outputs.version }}
          path: build/distributions/*.zip
          if-no-files-found: error

  # ----------------------------------------------------------------
  # 仅在推送 tag（如 v1.0.0）时自动创建 GitHub Release 并附带插件 ZIP
  # ----------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
